[build]
  command = "npm run build"
  publish = "dist"

# Proxy /api/* to the deployed Cloud Function named `api`.
# Path explanation: the first `/api` in the target is the FUNCTION NAME;
# the second `/api` is what Express sees (its routes are mounted at /api/*).
# Result: a frontend call to /api/health → function receives /api/health.
[[redirects]]
  from = "/api/*"
  to = "https://us-central1-ai-designer-b3ea6.cloudfunctions.net/api/api/:splat"
  status = 200
  force = true

# SPA fallback for client-side routing.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
